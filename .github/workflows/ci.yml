name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  plan:
    name: plan
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      python: ${{ steps.plan.outputs.python }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Plan
        id: plan
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          while IFS= read -r file; do
            [[ -z "$file" ]] && continue
            [[ "$file" =~ \.py$ ]] && python_changed=1
            [[ "$file" == "pyproject.toml" || "$file" == "uv.lock" || "$file" == ".python-version" ]] && python_changed=1
          done <<< "$(git diff --name-only "${BASE_SHA:-origin/main}...HEAD")"

          out() { [[ "$2" ]] && echo "$1=true" || echo "$1=false"; }
          { out python "$python_changed"; } >> "$GITHUB_OUTPUT"

  build:
    name: python-${{ matrix.os }}
    needs: plan
    if: needs.plan.outputs.python == 'true'
    timeout-minutes: 15
    strategy:
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
      fail-fast: false
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true

      - name: Install python and project dependencies
        run: uv sync --dev --locked

      - name: Run Formatter
        run: uv run ruff format --check

      - name: Run Linter
        run: uv run ruff check --output-format github --exit-non-zero-on-fix

      - name: Run Type Checker
        run: uv run ty check --output-format github

      - name: Run Tests
        env:
          SDL_VIDEODRIVER: dummy
          SDL_AUDIODRIVER: dummy
        run: uv run pytest tests/ -v

      - name: Minimize uv cache
        run: uv cache prune --ci
